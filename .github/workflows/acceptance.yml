name: Acceptance (billable)

# Real, billable acceptance tests against a live, isolated, budget-limited Hetzner
# project (BRIEFING.md §8.3, §15). Never runs on fork PRs (secret exposure).
on:
  workflow_dispatch:
    inputs:
      run_arm:
        description: "Also run the arm (cax11 + aarch64) matrix leg"
        type: boolean
        default: false
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * *" # nightly

# One acceptance run at a time — avoids racing on the shared CI project.
concurrency:
  group: acceptance
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  acceptance:
    name: acceptance (${{ matrix.arch }})
    # Never expose secrets to fork PRs.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86
            package: test-image-x86
          # arm is gated: only on explicit dispatch input, or always before a
          # release (a release workflow can dispatch this with run_arm=true).
          - arch: arm
            package: test-image-arm
            gated: true
    env:
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
    steps:
      - name: Skip gated arm leg unless requested
        if: matrix.gated && inputs.run_arm != true
        run: |
          echo "arm leg is gated; set run_arm=true to run it. Skipping."
          echo "SKIP=1" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4
        if: env.SKIP != '1'
      - uses: DeterminateSystems/nix-installer-action@main
        if: env.SKIP != '1'
      - uses: DeterminateSystems/magic-nix-cache-action@main
        if: env.SKIP != '1'

      - name: Enable KVM (needed to build the Alpine fixture)
        if: env.SKIP != '1'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build the ${{ matrix.arch }} fixture
        if: env.SKIP != '1'
        run: |
          nix build .#${{ matrix.package }}
          echo "FIXTURE=$(ls result/*.raw.xz)" >> "$GITHUB_ENV"

      - name: Run acceptance tests
        if: env.SKIP != '1'
        env:
          TF_ACC: "1"
          HCLOUDIMAGE_ACC_IMAGE_PATH: ${{ env.FIXTURE }}
          HCLOUDIMAGE_ACC_SSH_KEY: ${{ github.workspace }}/test/fixtures/throwaway_ed25519
          HCLOUDIMAGE_ACC_RUN_ARM: ${{ matrix.arch == 'arm' && '1' || '0' }}
        run: |
          chmod 600 test/fixtures/throwaway_ed25519
          nix develop --command bash -c '
            export TF_ACC_TERRAFORM_PATH="$(command -v terraform)"
            go test ./internal/provider -run TestAccImage_RealHetzner -v -timeout 60m
          '

      # Sweep any snapshots left by a crashed run — runs even on failure.
      - name: Cleanup orphans
        if: always() && env.SKIP != '1'
        run: |
          nix develop --command hcloud-upload-image cleanup || true
