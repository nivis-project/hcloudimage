name: Release

# Cuts a signed release on a version tag. The registries (Terraform + OpenTofu)
# ingest the resulting GitHub release assets (BRIEFING.md §10). The GPG key and
# secrets are human-provided (BRIEFING.md §14).
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # create the GitHub release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for the changelog

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}

      - name: Run goreleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
        run: nix develop --command goreleaser release --clean
