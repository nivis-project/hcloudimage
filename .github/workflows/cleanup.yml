name: Cleanup orphans

# Nightly label-scoped sweep of snapshots/servers left behind by crashed
# acceptance runs (BRIEFING.md §8.3, §15). Scoped to the library's label so it
# only removes resources this project created.
on:
  workflow_dispatch:
  schedule:
    - cron: "47 4 * * *" # nightly, after the acceptance schedule

permissions:
  contents: read

jobs:
  sweep:
    name: hcloud-upload-image cleanup
    runs-on: ubuntu-latest
    env:
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Sweep orphaned resources
        run: |
          # hcloud-upload-image tags everything with apricote.de/created-by, so the
          # cleanup is inherently label-scoped to this tool's resources.
          nix develop --command hcloud-upload-image cleanup
